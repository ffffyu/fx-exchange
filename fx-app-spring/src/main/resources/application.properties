spring.application.name=fx-app-spring
server.port=8080

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# fxdb — schema owned by Liquibase change sets
spring.datasource.url=jdbc:mysql://localhost:3306/fxdb
spring.datasource.username=appuser
spring.datasource.password=apppass

# Error hardening — Spring's own fallback error page must never leak internals either
# (your @RestControllerAdvice handles the paths it knows; these cover the rest).
server.error.include-message=never
server.error.include-stacktrace=never
