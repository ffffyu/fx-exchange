databaseChangeLog:
  - changeSet:
      id: 003-create-fx-rate
      author: fx
      comment: Daily exchange rates between currency pairs.
      changes:
        - createTable:
            tableName: fx_rate
            columns:
              - column:
                  name: id
                  type: INT
                  constraints: { primaryKey: true, nullable: false, autoIncrement: true }
              - column:
                  name: base_code
                  type: CHAR(3)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_fx_rate_base
                    references: currency(code)
              - column:
                  name: quote_code
                  type: CHAR(3)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_fx_rate_quote
                    references: currency(code)
              - column:
                  name: rate
                  type: DECIMAL(12,4)
                  constraints: { nullable: false }
              - column:
                  name: rate_date
                  type: DATE
                  constraints: { nullable: false }
      rollback:
        - dropTable: { tableName: fx_rate }
